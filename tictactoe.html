<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❌⭕ Ram's Tic Tac Toe — Arcade Edition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #00c9ff;
    padding: 20px;
  }
  .cabinet {
    background: #2c2c54;
    border-radius: 28px;
    padding: 24px;
    box-shadow: 0 0 40px rgba(0, 201, 255, 0.18), inset 0 0 20px rgba(0,0,0,0.5);
    border: 2px solid #3d3d6b;
    max-width: 460px;
    width: 100%;
  }
  .screen {
    background: #0a0a23;
    border-radius: 12px;
    padding: 18px;
    box-shadow: inset 0 0 18px rgba(0, 201, 255, 0.25);
    border: 2px solid #00c9ff44;
  }
  h1 {
    text-align: center;
    font-size: 20px;
    letter-spacing: 2px;
    margin-bottom: 10px;
    color: #fff;
    text-shadow: 0 0 8px #00c9ff;
  }
  .status {
    text-align: center;
    font-size: 14px;
    margin-bottom: 14px;
    min-height: 22px;
    color: #9acd32;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .cell {
    aspect-ratio: 1 / 1;
    background: #16213e;
    border: 2px solid #00c9ff66;
    border-radius: 10px;
    font-size: 56px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    transition: transform 0.08s ease, background 0.15s ease;
    color: #fff;
  }
  .cell:hover:not(.taken):not(.locked) {
    background: #1f2d57;
    transform: scale(1.03);
  }
  .cell.x { color: #ff6b6b; text-shadow: 0 0 12px #ff6b6b88; }
  .cell.o { color: #00c9ff; text-shadow: 0 0 12px #00c9ff88; }
  .cell.win { background: #2e7d32; border-color: #9acd32; }
  .cell.taken, .cell.locked { cursor: not-allowed; }
  .scoreboard {
    display: flex;
    justify-content: space-between;
    background: #16213e;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 12px;
    font-size: 13px;
  }
  .scoreboard span { color: #fff; }
  .controls {
    display: flex;
    gap: 8px;
    justify-content: center;
  }
  button {
    background: #00c9ff;
    color: #0a0a23;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    transition: filter 0.15s;
  }
  button:hover { filter: brightness(1.1); }
  button.secondary { background: #2c2c54; color: #00c9ff; border: 1px solid #00c9ff66; }
  .mode {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 12px;
  }
  .mode label { cursor: pointer; padding: 4px 10px; border-radius: 6px; background: #16213e; color: #ccc; }
  .mode input { display: none; }
  .mode input:checked + span { color: #00c9ff; font-weight: bold; }
  footer {
    text-align: center;
    color: #6b7280;
    font-size: 11px;
    margin-top: 14px;
  }
</style>
</head>
<body>
  <div class="cabinet">
    <div class="screen">
      <h1>❌⭕ TIC TAC TOE</h1>
      <div class="mode">
        <label><input type="radio" name="mode" value="pvp"><span>👥 2 Players</span></label>
        <label><input type="radio" name="mode" value="cpu" checked><span>🤖 vs CPU</span></label>
      </div>
      <div class="status" id="status">Your turn — you are ❌</div>
      <div class="board" id="board"></div>
      <div class="scoreboard">
        <div>❌ <span id="scoreX">0</span></div>
        <div>🤝 <span id="scoreD">0</span></div>
        <div>⭕ <span id="scoreO">0</span></div>
      </div>
      <div class="controls">
        <button id="reset">🔄 New Game</button>
        <button class="secondary" id="clearScore">Clear Scores</button>
      </div>
      <footer>Tip: there's also a <em>live, multiplayer</em> version on the README — powered by GitHub Actions.</footer>
    </div>
  </div>

<script>
(function () {
  const WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  const boardEl  = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const scoreXEl = document.getElementById('scoreX');
  const scoreOEl = document.getElementById('scoreO');
  const scoreDEl = document.getElementById('scoreD');
  const resetBtn = document.getElementById('reset');
  const clearBtn = document.getElementById('clearScore');
  const modeInputs = document.querySelectorAll('input[name="mode"]');

  let board, current, winner, locked, mode;
  const scores = { X: 0, O: 0, D: 0 };

  function newGame() {
    board   = Array(9).fill('');
    current = 'X';
    winner  = null;
    locked  = false;
    render();
    setStatus(modeLabel() + ' — ❌ moves first');
  }

  function modeLabel() {
    return mode === 'cpu' ? "You're ❌ vs 🤖" : 'Two players';
  }

  function setStatus(msg) { statusEl.textContent = msg; }

  function render() {
    boardEl.innerHTML = '';
    const winLine = winner ? findWinLine() : [];
    board.forEach((v, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell' + (v ? ' taken ' + v.toLowerCase() : '') +
                       (winLine.includes(i) ? ' win' : '') +
                       (locked && !v ? ' locked' : '');
      cell.textContent = v === 'X' ? '✕' : v === 'O' ? '◯' : '';
      cell.addEventListener('click', () => play(i));
      boardEl.appendChild(cell);
    });
    scoreXEl.textContent = scores.X;
    scoreOEl.textContent = scores.O;
    scoreDEl.textContent = scores.D;
  }

  function findWinLine() {
    for (const line of WIN_LINES) {
      const [a,b,c] = line;
      if (board[a] && board[a] === board[b] && board[a] === board[c]) return line;
    }
    return [];
  }

  function checkEnd() {
    const line = findWinLine();
    if (line.length) {
      winner = board[line[0]];
      scores[winner] += 1;
      setStatus(`🏆 ${winner === 'X' ? '❌' : '⭕'} wins! Press "New Game" to play again.`);
      locked = true;
      return true;
    }
    if (board.every(Boolean)) {
      scores.D += 1;
      setStatus("🤝 It's a draw! Press \"New Game\" to play again.");
      locked = true;
      return true;
    }
    return false;
  }

  function play(i) {
    if (locked || board[i] || winner) return;
    if (mode === 'cpu' && current === 'O') return; // wait for CPU
    board[i] = current;
    render();
    if (checkEnd()) { render(); return; }
    current = current === 'X' ? 'O' : 'X';
    setStatus(current === 'X' ? '❌ to move' : (mode === 'cpu' ? '🤖 thinking…' : '⭕ to move'));
    if (mode === 'cpu' && current === 'O') {
      locked = true; render();
      setTimeout(cpuMove, 380);
    }
  }

  // Minimax for an unbeatable CPU — small board, exhaustive search is fine.
  function cpuMove() {
    let bestScore = -Infinity, bestMove = -1;
    for (let i = 0; i < 9; i++) {
      if (board[i]) continue;
      board[i] = 'O';
      const s = minimax(board, 0, false);
      board[i] = '';
      if (s > bestScore) { bestScore = s; bestMove = i; }
    }
    if (bestMove >= 0) {
      board[bestMove] = 'O';
      locked = false;
      render();
      if (!checkEnd()) {
        current = 'X';
        setStatus('Your turn — ❌');
      } else {
        render();
      }
    }
  }

  function scoreBoard(b) {
    for (const [a, c1, c2] of WIN_LINES) {
      if (b[a] && b[a] === b[c1] && b[a] === b[c2]) return b[a] === 'O' ? 10 : -10;
    }
    return 0;
  }

  function minimax(b, depth, isMax) {
    const s = scoreBoard(b);
    if (s !== 0) return s - (isMax ? depth : -depth);
    if (b.every(Boolean)) return 0;
    let best = isMax ? -Infinity : Infinity;
    for (let i = 0; i < 9; i++) {
      if (b[i]) continue;
      b[i] = isMax ? 'O' : 'X';
      const val = minimax(b, depth + 1, !isMax);
      b[i] = '';
      best = isMax ? Math.max(best, val) : Math.min(best, val);
    }
    return best;
  }

  resetBtn.addEventListener('click', newGame);
  clearBtn.addEventListener('click', () => { scores.X = scores.O = scores.D = 0; render(); });
  modeInputs.forEach(input => input.addEventListener('change', e => {
    mode = e.target.value;
    newGame();
  }));

  mode = document.querySelector('input[name="mode"]:checked').value;
  newGame();
})();
</script>
</body>
</html>
